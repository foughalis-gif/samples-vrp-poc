name: Gemini Automated Issue Triage
on:
  issues:
    types: [opened, reopened]
permissions:
  contents: read
  issues: write
jobs:
  triage-issue:
    if: github.event_name == 'issues'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gemini Issue Triage
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |
            {
              "maxSessionTurns": 25,
              "coreTools": [
                "run_shell_command(gh label list)",
                "run_shell_command(gh issue edit)"
              ]
            }
          prompt: |
            You are an issue triage assistant. Review the issue title
            and body in the environment variables ISSUE_TITLE and ISSUE_BODY.
            Run gh label list, then apply appropriate labels using
            gh issue edit ISSUE_NUMBER --add-label label1,label2
